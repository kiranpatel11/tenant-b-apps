name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Lint and render tenant chart
        run: |
          helm lint deploy
          helm template tenant-b deploy -f deploy/values.yaml --namespace tenant-b | tee /tmp/rendered.yaml
          grep -q 'kind: RedisEnterpriseCluster' /tmp/rendered.yaml
          grep -q 'kind: RedisEnterpriseDatabase' /tmp/rendered.yaml
